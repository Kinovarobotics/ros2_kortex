name: Claude PR Review Gate

on:
  issue_comment:
    types: [created]

jobs:
  request-review:
    # Only run on PR comments (not plain issue comments)
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: read

    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Check if commenter is the original issue reporter
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          COMMENTER="${{ github.event.comment.user.login }}"

          # Skip bot comments
          if [[ "$COMMENTER" == *"[bot]"* ]]; then
            echo "Commenter is a bot, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract original issue number from PR body ("Closes #N")
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body')
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oP 'Closes #\K[0-9]+' || true)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked issue found in PR body, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the original issue author
          ISSUE_AUTHOR=$(gh issue view "$ISSUE_NUMBER" --json author -q '.author.login')

          echo "PR #$PR_NUMBER | Issue #$ISSUE_NUMBER | Reporter: $ISSUE_AUTHOR | Commenter: $COMMENTER"

          if [ "$COMMENTER" != "$ISSUE_AUTHOR" ]; then
            echo "Commenter is not the issue reporter, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Request review from aalmrad
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.check.outputs.pr_number }}"
          COMMENTER="${{ github.event.comment.user.login }}"
          COMMENT_URL="${{ github.event.comment.html_url }}"

          gh pr edit "$PR_NUMBER" --add-reviewer aalmrad

          gh pr comment "$PR_NUMBER" \
            --body "@aalmrad — @${COMMENTER} has replied to this PR (see ${COMMENT_URL}). Your review is requested to decide the next steps."
