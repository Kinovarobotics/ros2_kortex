name: Claude PR Review Gate

on:
  issue_comment:
    types: [created]

jobs:
  request-review:
    # Only run on issue comments (not PR comments)
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: read

    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Check if commenter is the issue author and a Claude fix PR exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          COMMENTER="${{ github.event.comment.user.login }}"

          # Skip bot comments
          if [[ "$COMMENTER" == *"[bot]"* ]]; then
            echo "Commenter is a bot, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check commenter is the issue author
          ISSUE_AUTHOR=$(gh issue view "$ISSUE_NUMBER" --json author -q '.author.login')
          if [ "$COMMENTER" != "$ISSUE_AUTHOR" ]; then
            echo "Commenter is not the issue author, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if an open Claude fix PR exists for this issue
          PR_NUMBER=$(gh pr list --head "claude-fix/issue-${ISSUE_NUMBER}" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            echo "No open Claude fix PR found for issue #${ISSUE_NUMBER}, skipping."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Issue #$ISSUE_NUMBER | PR #$PR_NUMBER | Author: $ISSUE_AUTHOR | Commenter: $COMMENTER"
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Request review from aalmrad
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.check.outputs.pr_number }}"
          COMMENTER="${{ github.event.comment.user.login }}"
          COMMENT_URL="${{ github.event.comment.html_url }}"

          gh pr edit "$PR_NUMBER" --add-reviewer aalmrad

          gh pr comment "$PR_NUMBER" \
            --body "@aalmrad — @${COMMENTER} (the issue author) has commented on the issue (see ${COMMENT_URL}). Your review is requested to decide the next steps."
