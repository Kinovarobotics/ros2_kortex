name: Claude Daily Issue Triage

on:
  schedule:
    - cron: "0 14 * * 1"   # runs daily at 09:00 EST
  workflow_dispatch:      # allows manual trigger

jobs:
  triage:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Fetch open issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --state open \
            --limit 100 \
            --json number,title,body,labels,url \
            > issues.json

      - name: Run Claude triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUES=$(cat issues.json)

          claude "
          You are performing automated GitHub issue triage.

          Here is a JSON list of open issues:

          $ISSUES

          For each issue:
          - Classify as 'Bug', 'Feature Request', or 'Other'
          - Suggest appropriate labels
          - Assign a complexity score from 1 (very easy) to 10 (very complex)

          Output clean markdown with sections:
          ## Bugs
          ## Feature Requests
          ## Other

          For each issue include:
          - Title
          - URL
          - Suggested labels
          - Complexity score
          " > triage_report.md

      - name: Upload triage report
        uses: actions/upload-artifact@v4
        with:
          name: triage-report
          path: triage_report.md
