  name: Claude Auto-Fix Issue                                                                                                                                            
                  
  on:
    workflow_dispatch:
      inputs:
        issue_number:
          description: 'Issue number to fix (leave empty to sweep all open issues)'
          required: false
          type: string                                                                                                                                                   
   
  jobs:                                                                                                                                                                  
    auto-fix:     
      # Run when manually dispatched with a specific issue number
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number != ''                                                                             
      runs-on: ubuntu-latest
                                                                                                                                                                         
      permissions:
        issues: write
        contents: write
        pull-requests: write
                                                                                                                                                                         
      steps:
        - name: Checkout repository                                                                                                                                      
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: 20                                                                                                                                             
   
        - name: Install dependencies                                                                                                                                     
          run: |  
            npm install -g @anthropic-ai/claude-code
            sudo apt-get update && sudo apt-get install -y gh jq

        - name: Configure git
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}                                                                                                                    
          run: |
            git config user.name "github-actions[bot]"                                                                                                                   
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"                                                       
   
        - name: Process single issue                                                                                                                                     
          env:    
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}                                                                                                          
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |                                                                                                                                                         
            WORKDIR=$(pwd)
            ISSUES="${{ github.event.inputs.issue_number }}"
                                                                                                                                                                         
            for ISSUE_NUMBER in $ISSUES; do
              echo "=============================="                                                                                                                      
              echo "Processing issue #${ISSUE_NUMBER}"
              echo "=============================="

              # Skip if a fix PR already exists for this issue
              EXISTING_PR=$(gh pr list --head "claude-fix/issue-${ISSUE_NUMBER}" --state open --json number -q '.[0].number' 2>/dev/null || true)
              if [ -n "$EXISTING_PR" ]; then                                                                                                                             
                echo "Open PR already exists for issue #${ISSUE_NUMBER} (PR #${EXISTING_PR}), skipping."
                continue                                                                                                                                                 
              fi  
                                                                                                                                                                         
              # Fetch issue details
              gh issue view "$ISSUE_NUMBER" \
                --json number,title,body,labels,url,author \
                > issue.json                                                                                                                                             
              echo "--- Issue #${ISSUE_NUMBER} details ---"
              cat issue.json                                                                                                                                             
                  
              # Detect target branch from issue labels, then title/body, then default to main
              TARGET_BRANCH="main"
              for DISTRO in humble jazzy; do                                                                                                                             
                if jq -e --arg d "$DISTRO" '.labels[].name | ascii_downcase | contains($d)' issue.json > /dev/null 2>&1; then
                  TARGET_BRANCH="$DISTRO"                                                                                                                                
                  break
                fi                                                                                                                                                       
              done
              if [ "$TARGET_BRANCH" = "main" ]; then
                ISSUE_TEXT=$(jq -r '.title + " " + (.body // "")' issue.json | tr '[:upper:]' '[:lower:]')
                for DISTRO in humble jazzy; do                                                                                                                           
                  if echo "$ISSUE_TEXT" | grep -q "$DISTRO"; then
                    TARGET_BRANCH="$DISTRO"                                                                                                                              
                    break
                  fi
                done                                                                                                                                                     
              fi
              echo "Target branch: $TARGET_BRANCH"                                                                                                                       
                  
              # Reset to target branch before creating a new branch
              git checkout "$TARGET_BRANCH" 2>/dev/null || git checkout -f HEAD
              git pull origin "$TARGET_BRANCH" --rebase 2>/dev/null || git rebase --abort 2>/dev/null || true
                                                                                                                                                                         
              # Create fix branch
              BRANCH_NAME="claude-fix/issue-${ISSUE_NUMBER}"                                                                                                             
              git checkout -b "$BRANCH_NAME" 2>/dev/null || git checkout "$BRANCH_NAME"
                                                                                                                                                                         
              # Post starting comment
              gh issue comment "$ISSUE_NUMBER" \                                                                                                                         
                --body "As part of Kinova's beta testing: Claude is analyzing this issue and will attempt an automated fix. A pull request will be opened if changes are 
  made."                                                                                                                                                                 
   
              # Write prompt to temp file                                                                                                                                
              PROMPT_FILE=$(mktemp /tmp/claude-prompt-XXXXXX.txt)
              {
                printf '%s\n' \
                  "You are an expert ROS2 software engineer working on the ros2_kortex package," \
                  "which provides ROS2 support for Kinova Gen3 and Gen3 Lite robotic arms." \                                                                            
                  "" \
                  "Your task is to analyze the following GitHub issue and implement a fix directly" \                                                                    
                  "in the codebase." \                                                                                                                                   
                  "" \
                  "Issue details:"                                                                                                                                       
                cat issue.json
                printf '%s\n' \
                  "" \
                  "Instructions:" \
                  "1. Read and understand the issue carefully." \
                  "2. Explore the relevant source files to understand the current implementation." \
                  "3. Implement a minimal, focused fix that addresses the root cause." \                                                                                 
                  "4. Do not refactor unrelated code or add unnecessary changes." \
                  "5. Ensure the fix does not break existing functionality." \                                                                                           
                  "" \                                                                                                                                                   
                  "Go ahead and implement the fix now."
              } > "$PROMPT_FILE"                                                                                                                                         
                  
              # Run Claude (handle root user restriction)
              if [ "$(id -u)" = "0" ]; then
                CLAUDE_BIN=$(which claude)
                useradd -m -s /bin/bash claude-runner 2>/dev/null || true                                                                                                
                chown -R claude-runner "$WORKDIR"
                chmod o+rx "$PROMPT_FILE" 2>/dev/null || true                                                                                                            
                chmod o+x /root $(dirname "$WORKDIR") $(dirname "$(dirname "$WORKDIR")") 2>/dev/null || true                                                             
                sudo -u claude-runner \
                  env PATH="$PATH" \                                                                                                                                     
                  ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
                  HOME="/home/claude-runner" \                                                                                                                           
                  bash -c "cd '$WORKDIR' && '$CLAUDE_BIN' --dangerously-skip-permissions -p \"\$(cat '$PROMPT_FILE')\""
                chown -R root "$WORKDIR"                                                                                                                                 
              else
                claude --dangerously-skip-permissions -p "$(cat "$PROMPT_FILE")"                                                                                         
              fi  
              rm -f "$PROMPT_FILE"
                                                                                                                                                                         
              # Check for changes
              git add -A                                                                                                                                                 
              if git diff --cached --quiet; then
                CHANGED=false
              else
                CHANGED=true
              fi

              if [ "$CHANGED" = "true" ]; then
                git commit -m "fix: automated fix attempt for issue #${ISSUE_NUMBER}"
                git push origin "$BRANCH_NAME"                                                                                                                           
   
                ISSUE_TITLE=$(jq -r '.title' issue.json)                                                                                                                 
                gh pr create \
                  --title "fix(claude): resolve issue #${ISSUE_NUMBER} - ${ISSUE_TITLE}" \
                  --body "## Automated Fix Attempt                                                                                                                       
   
                As part of Kinova's beta testing: This PR was automatically generated by Claude to address issue #${ISSUE_NUMBER}.                                       
                  
                **Issue:** ${ISSUE_TITLE}                                                                                                                                
   
                > **Warning:** This is an automated fix. All changes will be carefully reviewed by a member of Kinova's team before merging.                             
                  
                Closes #${ISSUE_NUMBER}" \
                  --base "$TARGET_BRANCH" \
                  --head "$BRANCH_NAME"
                                                                                                                                                                         
                PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q '.url')
                gh issue comment "$ISSUE_NUMBER" \                                                                                                                       
                  --body "Claude has submitted a fix attempt: ${PR_URL}

                Please review the proposed modifications and test them on your end, then provide feedback here.                                                          
                A member of Kinova's team will follow up on this issue and take the appropriate next steps."
                                                                                                                                                                         
                PR_NUMBER=$(gh pr view "$BRANCH_NAME" --json number -q '.number')                                                                                        
                ISSUE_AUTHOR=$(jq -r '.author.login' issue.json)
                gh pr comment "$PR_NUMBER" \                                                                                                                             
                  --body "Hi @${ISSUE_AUTHOR}! An automated fix has been proposed for your issue. Could you please test this PR on your end and reply here with your 
  results? Your feedback will help us decide the next steps."                                                                                                            
              else
                gh issue comment "$ISSUE_NUMBER" \                                                                                                                       
                  --body "Claude analyzed this issue but was unable to determine an automated fix. Manual intervention is required."
                # Clean up the unused branch                                                                                                                             
                git checkout main 2>/dev/null || true
                git branch -D "$BRANCH_NAME" 2>/dev/null || true                                                                                                         
              fi  

            done

    scheduled-sweep:                                                                                                                                                     
      # Run when manually dispatched with no specific issue number
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number == ''                                                                             
      runs-on: ubuntu-latest
                                                                                                                                                                         
      permissions:
        issues: write                                                                                                                                                    
        contents: write
        pull-requests: write

