name: Claude Auto-Fix Issue

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9:00 AM EST (UTC-5 = 14:00 UTC)
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to attempt to fix'
        required: true
        type: string

jobs:
  auto-fix:
    # Only run when the 'claude-fix' label is applied, or triggered manually
    if: github.event.label.name == 'claude-fix' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch issue details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ steps.issue.outputs.number }} \
            --json number,title,body,labels,url,author \
            > issue.json
          echo "--- Issue details ---"
          cat issue.json

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Create fix branch
        run: |
          git checkout -b claude-fix/issue-${{ steps.issue.outputs.number }}

      - name: Post starting comment on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.issue.outputs.number }} \
            --body "Claude is analyzing this issue and will attempt an automated fix. A pull request will be opened if changes are made."

      - name: Run Claude to analyze and fix issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_CONTENT=$(cat issue.json)
          WORKDIR=$(pwd)
